<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Review</title>
</head>
<body>
    <h1>Post a Review for Dealer {{ dealer_id }}</h1>
    <form method="post">
        {% csrf_token %}
        <label for="review">Review:</label><br>
        <textarea id="review" name="review" rows="4" cols="50" required></textarea><br><br>
        <label for="rating">Rating (1-5):</label>
        <input type="number" id="rating" name="rating" min="1" max="5" required><br><br>
        <label for="purchase">Purchased a car?</label>
        <input type="checkbox" id="purchase" name="purchase"><br><br>
        <button type="submit">Submit Review</button>
    </form>
</body>
</html>
